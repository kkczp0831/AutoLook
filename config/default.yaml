app:
  name: AutoLook
  overlay_thickness: 3
  debug_interval_seconds: 1.0
  tick_interval_seconds: 0.01

window:
  title_keyword: "洛克王国"
  auto_locate: true
  use_client_area: true
  activate_before_start: false
  region:
    left: 0
    top: 0
    width: 2560
    height: 1440

targets:
  pets:
    - name: "恶魔狼"
      enabled: true
      detector_label: "demon_wolf"
      min_confidence: 0.6

vision:
  backend: "yolo"
  template_dir: "data/templates"
  template_match_threshold: 0.4
  model_path: "data/models/best_v2.pt"
  yolo_confidence_threshold: 0.6
  input_size:
    width: 416
    height: 416
  tracking:
    enabled: false
    detector_interval_frames: 1
    max_stale_frames: 5
    search_margin_px: 160
    min_confidence: 0.6
    template_padding_px: 12
  debug_screenshots: false

control:
  camera:
    center_tolerance_px: 50
    key_left: "left"
    key_right: "right"
    key_up: "up"
    key_down: "down"
  capture:
    ball_button: "left"
    aim_hold_seconds: 0.1
    throw_cooldown_seconds: 0.1
